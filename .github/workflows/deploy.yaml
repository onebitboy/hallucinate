name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rsync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync files
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          rsync -az \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'storage/' \
            --exclude 'data/' \
            --exclude '.env' \
            -e "ssh -p ${SSH_PORT:-22}" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_PATH"

      - name: Stop app
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "bash -lc '
            cd \"$REMOTE_PATH\"
            sudo -n systemctl kill --kill-who=all --signal=SIGKILL hallucinate
            sudo -n systemctl stop hallucinate
          '"

      - name: Install dependencies and build
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "bash -lc '
            export BUN_INSTALL=\"\${BUN_INSTALL:-\$HOME/.bun}\"
            export PATH=\"\$BUN_INSTALL/bin:\$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:\$PATH\"
            cd \"$REMOTE_PATH\"
            command -v bun
            bun install
            bun run build
          '"

      - name: Start app
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "bash -lc '
            cd \"$REMOTE_PATH\"
            sudo -n systemctl start hallucinate
          '"
